name: release

# Publish a version tag (e.g. v1.1.0): build the sdist + wheel, publish to
# PyPI via Trusted Publishing (OIDC — no API token stored), push the
# container image to ghcr.io/vouchdev/vouch, and create the GitHub release
# with the dists attached and the matching CHANGELOG section as the body.
# The release title comes from the annotated tag's subject (falls back to
# the tag name for lightweight tags).
# One-time setup on PyPI: add a trusted publisher for project `vouch-kb`
# pointing at vouchdev/vouch, workflow `release.yml`, environment `pypi`.
# Every job is idempotent, so a re-cut tag republishes cleanly.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build the React console so the wheel can bundle it as vouch/web/console
      # (hatch_build.py force-includes webapp/dist when present).
      - uses: actions/setup-node@v4 # zizmor: ignore[cache-poisoning] release runs only on maintainer v* tag pushes; no untrusted input and no shared PR-writable cache
        with:
          node-version: "20"
      - run: npm --prefix webapp ci && npm --prefix webapp run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      # sdist is source-only; the wheel is built from the working tree (not the
      # sdist) so the freshly-built, gitignored webapp/dist rides inside it.
      - run: python -m build --sdist
      - run: python -m build --wheel
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # tolerate re-runs and re-cut tags — pypi versions are immutable,
          # so an already-published dist is skipped instead of failing 400.
          skip-existing: true

  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # push ghcr.io/vouchdev/vouch
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          # v1.1.0 -> 1.1.0, 1.1, latest (latest is automatic for semver)
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the release for the tag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: collect release title and notes
        id: notes
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          # checkout leaves the tag peeled to its commit; fetch the real tag
          # object so an annotated tag's subject can become the title.
          git fetch --force --quiet origin "refs/tags/$tag:refs/tags/$tag" || true
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { on = 1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "no CHANGELOG section for ${version}; falling back" >&2
            printf 'See CHANGELOG.md.\n' > release-notes.md
          fi
          if [ "$(git cat-file -t "$tag" 2>/dev/null)" = "tag" ]; then
            title="$(git tag -l --format='%(contents:subject)' "$tag")"
          else
            title="$tag"
          fi
          printf 'title=%s\n' "${title:-$tag}" >> "$GITHUB_OUTPUT"
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ steps.notes.outputs.title }}
        run: |
          # idempotent: a re-run or a moved tag replaces the stale release
          # instead of failing on "already exists".
          gh release delete "${GITHUB_REF_NAME}" --yes --repo "$GITHUB_REPOSITORY" || true
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "$TITLE" \
            --notes-file release-notes.md

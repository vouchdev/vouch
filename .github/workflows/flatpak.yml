name: flatpak

on:
  push:
    branches: [main]
    paths:
      - 'desktop/flatpak/**'
      - 'tests/test_flatpak.py'
      - '.github/workflows/flatpak.yml'
  pull_request:
    paths:
      - 'desktop/flatpak/**'
      - 'tests/test_flatpak.py'
      - '.github/workflows/flatpak.yml'

jobs:
  validate:
    name: validate packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: generate icons
        run: python desktop/flatpak/scripts/generate-icons.py

      - name: validate manifest
        run: python desktop/flatpak/scripts/validate-manifest.py --strict

      - name: pytest flatpak contract
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          python -m pytest tests/test_flatpak.py -q

  build:
    name: flatpak-builder smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: install flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: add flathub
        run: flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: install runtime 23.08
        run: |
          flatpak install -y --user flathub \
            org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08

      - name: generate icons
        run: python desktop/flatpak/scripts/generate-icons.py

      - name: build
        run: |
          cd desktop/flatpak
          flatpak-builder --repo=repo --force-clean --install-deps-from=flathub \
            build-dir com.vouchdev.vouch.yaml

      - name: upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-repo
          path: desktop/flatpak/repo/

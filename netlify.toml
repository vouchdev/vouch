# vouchai.dev — static landing page, no build step.
# source lives in site/; every merge to main deploys once the
# netlify site is linked to this repo (see the landing+docs spec).

[build]
  publish = "site"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # everything is first-party; keep it that way
    # style-src allows inline style attributes (stagger delays, lane colors
    # set from first-party js); scripts remain strictly self-hosted.
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="vouch">
  <title>vouch</title>
  <!-- monograph palette: cream paper, ink, vermillion -->
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.10  0 0 0 0 0.07  0 0 0 0 0.03  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- paper -->
  <rect width="256" height="256" rx="36" fill="#f1ead3"/>

  <!-- inset hairline rule -->
  <rect x="20" y="20" width="216" height="216" rx="22"
        fill="none" stroke="#1a1208" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- vermillion checkmark anchored under the V — review-gate signal -->
  <path d="M64 168 L108 208 L196 96"
        fill="none" stroke="#a82c1c" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ink V letterform, hand-cut feel -->
  <path d="M70 56 L128 196 L186 56"
        fill="none" stroke="#1a1208" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- paper grain overlay -->
  <rect width="256" height="256" rx="36" fill="#f1ead3" filter="url(#grain)" opacity="0.6"/>
</svg>

appId: dev.vouch.desktop
productName: vouch
copyright: MIT licensed

directories:
  output: release
  buildResources: build

files:
  - out/main/**
  - out/preload/**
  - out/renderer/**
  - package.json
  - "!**/*.map"

# When a frozen vouch is produced (scripts/freeze-vouch.sh, PyInstaller),
# drop it here and it ships under resources/vouch/ — the locator prefers it.
extraResources:
  - from: resources/vouch
    to: vouch
    filter: ["**/*"]

asar: true
# the bundled python binary must stay executable (not packed into the asar)
asarUnpack:
  - resources/vouch/**

mac:
  category: public.app-category.developer-tools
  target: [dmg]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target: [nsis]

linux:
  category: Development
  target: [AppImage]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

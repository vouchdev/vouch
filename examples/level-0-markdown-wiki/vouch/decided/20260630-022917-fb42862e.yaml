  body: "Shared vocabulary for the acme-example platform team. A living wiki page;\n\
    edits land via the normal review gate but the content is just definitions.\n\n\
    ## Terms\n\n- **monorepo** -- the single `acme-example/platform` repository that\
    \ holds\n  the API, web app, and shared libraries.\n- **staging** -- the pre-production\
    \ environment that mirrors prod; safe to\n  break.\n- **onboarding buddy** --\
    \ the engineer assigned to a new hire for their\n  first two weeks.\n- **starter\
    \ ticket** -- a deliberately small, well-scoped issue used to\n  walk a new engineer\
    \ through the full ship cycle.\n"
